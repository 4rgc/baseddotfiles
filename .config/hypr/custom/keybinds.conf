#/# bind = Super, h/i/l/j,, # Move focus in direction
bind = Super+Shift+Ctrl+Alt, H, movefocus, l # [hidden]
bind = Super+Shift+Ctrl+Alt, L, movefocus, r # [hidden]
bind = Super+Shift+Ctrl+Alt, K, movefocus, u # [hidden]
bind = Super+Shift+Ctrl+Alt, J, movefocus, d # [hidden]

unbind = Super, W
bind = Super+Ctrl+Shift+Alt, W, exec, firefox # Launch Firefox
