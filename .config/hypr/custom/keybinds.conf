# You can put your preferred keybinds here
# https://wiki.hyprland.org/Configuring/Binds/

bind = Super+Shift+Alt, M, exit # Exit Hyprland

bind = Super, R, togglesplit
bind = Ctrl+Super, P, pseudo

# Rebinds
unbind = Super, T
bind = Ctrl+Alt+Super, T, exec, ghostty # Launch Ghostty (terminal)
# bind = Super+Alt, T, exec, ghostty --command="ssh bohda@192.168.2.211" # Launch Ghostty (terminal) sessinon into work laptop
unbind = Super, L
bind = Ctrl+Alt, L, exec, hyprlock # Lock
unbind = Super, K
bindd = Ctrl+Alt+Super+Shift, K, Toggle on-screen keyboard, global, quickshell:oskToggle # Toggle on-screen keyboard

unbind = Super, Q
bind = Super+Ctrl+Shift+Alt, Q, killactive

# browser with W
bind = Super+Alt+Shift+Ctrl, W, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "brave" "google-chrome-stable" "zen-browser" "firefox" "chromium" "microsoft-edge-stable" "opera" "librewolf" # Browser

bind = Super+Alt+Shift+Ctrl, E, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "dolphin" "nautilus" "nemo" "thunar" "${TERMINAL}" "kitty -1 fish -c yazi" # File manager

bind = Super+Shift+Ctrl, code:10, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 1 # [hidden]
bind = Super+Shift+Ctrl, code:11, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 2 # [hidden]
