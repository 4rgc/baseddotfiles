# Hyper key remapping for Corne v4 keyboard
# Hyper = Ctrl+Shift+Alt+Super (all four modifiers held simultaneously)
# Tap Hyper = Escape
# https://wiki.hyprland.org/Configuring/Binds/

##! Unbinds — remove inaccessible/conflicting defaults

# Shell / UI
unbind = Super, Tab
unbind = Super, V
unbind = Super, Period
unbind = Super, A
unbind = Super+Alt, A
unbind = Super, B
unbind = Super, O
unbind = Super, N
unbind = Super, Slash
unbind = Super, K
unbind = Super, M
unbind = Super, G
unbind = Super, J
unbind = Ctrl+Super, T
unbind = Ctrl+Super+Alt, T
unbind = Ctrl+Super, R
unbind = Ctrl+Super, P

# Utilities
unbind = Super+Shift, S
unbind = Super+Shift, A
unbind = Super+Shift, X
unbind = Super+Shift, T
unbind = Super+Shift, C
unbind = Super+Shift, R
unbind = Super+Alt, R

# Window management
unbind = Super, mouse:272
unbind = Super, mouse:273
unbind = Super, mouse:274
unbind = Super, Left
unbind = Super, Right
unbind = Super, Up
unbind = Super, Down
unbind = Super, BracketLeft
unbind = Super, BracketRight
unbind = Super+Shift, Left
unbind = Super+Shift, Right
unbind = Super+Shift, Up
unbind = Super+Shift, Down
unbind = Super, Q
unbind = Super+Shift+Alt, Q
unbind = Super+Alt, Space
unbind = Super, D
unbind = Super, F
unbind = Super+Alt, F
unbind = Super, P
unbind = Super, Semicolon
unbind = Super, Apostrophe

# Workspace
unbind = Super, code:10
unbind = Super, code:11
unbind = Super, code:12
unbind = Super, code:13
unbind = Super, code:14
unbind = Super, code:15
unbind = Super, code:16
unbind = Super, code:17
unbind = Super, code:18
unbind = Super, code:19
unbind = Super, Page_Down
unbind = Super, Page_Up
unbind = Super, S
unbind = Super, mouse:275
unbind = Super+Alt, S
unbind = Ctrl+Super, S

# App launchers
unbind = Super, Return
unbind = Super, T
unbind = Super, E
unbind = Super, W
unbind = Super, C
unbind = Super, X
unbind = Super, I
unbind = Ctrl+Super, V

# Session / screen
unbind = Super, L
unbind = Super+Shift, L
unbind = Super, Minus
unbind = Super, Equal
unbind = Super, code:82
unbind = Super, code:86

##! Shell / UI
bind = Ctrl+Shift+Alt+Super, Tab, global, quickshell:overviewWorkspacesToggle # Overview

bindd = Ctrl+Shift+Alt+Super, V, Clipboard history >> clipboard, global, quickshell:overviewClipboardToggle # Clipboard history
bindd = Ctrl+Shift+Alt+Super, V, Clipboard history >> clipboard, exec, qs -c $qsConfig ipc call TEST_ALIVE || pkill fuzzel || cliphist list | fuzzel --match-mode fzf --dmenu | cliphist decode | wl-copy # [hidden]

bindd = Ctrl+Shift+Alt+Super, Period, Emoji >> clipboard, global, quickshell:overviewEmojiToggle # Emoji >> clipboard
bindd = Ctrl+Shift+Alt+Super, Period, Emoji >> clipboard, exec, qs -c $qsConfig ipc call TEST_ALIVE || pkill fuzzel || ~/.config/hypr/hyprland/scripts/fuzzel-emoji.sh copy # [hidden]

bind = Ctrl+Shift+Alt+Super, A, global, quickshell:sidebarLeftToggle # Left sidebar
bindd = Ctrl+Shift+Alt+Super, N, Toggle right sidebar, global, quickshell:sidebarRightToggle # Right sidebar
bindd = Ctrl+Shift+Alt+Super, Slash, Toggle cheatsheet, global, quickshell:cheatsheetToggle # Cheatsheet
bindd = Ctrl+Shift+Alt+Super, M, Toggle media controls, global, quickshell:mediaControlsToggle # Media controls
bind = Ctrl+Shift+Alt+Super, G, global, quickshell:overlayToggle # Overlay
bindd = Ctrl+Shift+Alt+Super, B, Toggle bar, global, quickshell:barToggle # Bar toggle
bindd = Ctrl+Shift, K, Toggle on-screen keyboard, global, quickshell:oskToggle # OSK

bindd = Ctrl+Shift+Alt+Super, Comma, Toggle wallpaper selector, global, quickshell:wallpaperSelectorToggle # Wallpaper selector
bindd = Ctrl+Shift+Alt+Super, Comma, Change wallpaper, exec, qs -c $qsConfig ipc call TEST_ALIVE || ~/.config/quickshell/$qsConfig/scripts/colors/switchwall.sh # [hidden]

bind = Ctrl+Shift, Equal, global, quickshell:panelFamilyCycle # Cycle panel family
bind = Ctrl+Shift, Backslash, exec, killall ydotool qs quickshell; qs -c $qsConfig & # Restart widgets

##! Utilities
bind = Ctrl+Shift+Alt+Super, S, global, quickshell:regionScreenshot # Screen snip
bind = Ctrl+Shift+Alt+Super, S, exec, qs -c $qsConfig ipc call TEST_ALIVE || pidof slurp || hyprshot --freeze --clipboard-only --mode region --silent # [hidden]

bind = Ctrl+Shift+Alt+Super, grave, global, quickshell:regionSearch # Google Lens region
bind = Ctrl+Shift+Alt+Super, grave, exec, qs -c $qsConfig ipc call TEST_ALIVE || pidof slurp || ~/.config/hypr/hyprland/scripts/snip_to_search.sh # [hidden]

bind = Ctrl+Shift, Apostrophe, global, quickshell:regionOcr # Character recognition >> clipboard
bind = Ctrl+Shift, Apostrophe, exec, qs -c $qsConfig ipc call TEST_ALIVE || pidof slurp || grim -g "$(slurp $SLURP_ARGS)" "/tmp/ocr_image.png" && tesseract "/tmp/ocr_image.png" stdout -l $(tesseract --list-langs | awk 'NR>1{print $1}' | tr '\n' '+' | sed 's/+$//') | wl-copy && rm "/tmp/ocr_image.png" # [hidden]

bindd = Ctrl+Shift, Comma, Color picker, exec, hyprpicker -a # Color picker

bindl = Ctrl+Shift, Minus, global, quickshell:regionRecord # Record region (no sound)
bindl = Ctrl+Shift, Minus, exec, qs -c $qsConfig ipc call TEST_ALIVE || ~/.config/quickshell/$qsConfig/scripts/videos/record.sh # [hidden]

##! Window management
# Mouse
bindm = Ctrl+Shift+Alt+Super, mouse:272, movewindow
bindm = Ctrl+Shift+Alt+Super, mouse:273, resizewindow

# Focus (HJKL — vim-style)
bind = Ctrl+Shift+Alt+Super, H, movefocus, l # [hidden]
bind = Ctrl+Shift+Alt+Super, J, movefocus, d # [hidden]
bind = Ctrl+Shift+Alt+Super, K, movefocus, u # [hidden]
bind = Ctrl+Shift+Alt+Super, L, movefocus, r # [hidden]

# Move window (arrow keys)
bind = Ctrl+Shift+Alt+Super, Left, movewindow, l # [hidden]
bind = Ctrl+Shift+Alt+Super, Right, movewindow, r # [hidden]
bind = Ctrl+Shift+Alt+Super, Up, movewindow, u # [hidden]
bind = Ctrl+Shift+Alt+Super, Down, movewindow, d # [hidden]

# Window actions
bind = Ctrl+Shift+Alt+Super, Q, killactive # Close window
bind = Ctrl+Shift, Delete, exec, hyprctl kill # Force kill
bind = Ctrl+Shift+Alt+Super, Space, togglefloating # Float/tile toggle
bind = Ctrl+Shift+Alt+Super, D, fullscreen, 1 # Maximize
bind = Ctrl+Shift+Alt+Super, F, fullscreen, 0 # Fullscreen
bind = Ctrl+Shift, F11, fullscreenstate, 0 3 # Fullscreen spoof
bind = Ctrl+Shift+Alt+Super, P, pin # Pin window
binde = Ctrl+Shift+Alt+Super, Semicolon, layoutmsg, splitratio -0.1 # [hidden]
binde = Ctrl+Shift+Alt+Super, Apostrophe, layoutmsg, splitratio +0.1 # [hidden]
bind = Ctrl+Shift+Alt+Super, R, togglesplit # Toggle split
bind = Ctrl+Shift+Alt+Super, Y, pseudo # Pseudo tiling

##! Workspaces
# Focus workspace 1–10 via Layer 1 macros (Ctrl+Shift+Super, no Alt)
bind = Super+Shift+Ctrl, code:10, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 1 # [hidden]
bind = Super+Shift+Ctrl, code:11, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 2 # [hidden]
bind = Super+Shift+Ctrl, code:12, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 3 # [hidden]
bind = Super+Shift+Ctrl, code:13, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 4 # [hidden]
bind = Super+Shift+Ctrl, code:14, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 5 # [hidden]
bind = Super+Shift+Ctrl, code:15, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 6 # [hidden]
bind = Super+Shift+Ctrl, code:16, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 7 # [hidden]
bind = Super+Shift+Ctrl, code:17, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 8 # [hidden]
bind = Super+Shift+Ctrl, code:18, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 9 # [hidden]
bind = Super+Shift+Ctrl, code:19, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 10 # [hidden]
bindp = Super+Shift+Ctrl, code:87, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 1  # [hidden]
bindp = Super+Shift+Ctrl, code:88, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 2  # [hidden]
bindp = Super+Shift+Ctrl, code:89, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 3  # [hidden]
bindp = Super+Shift+Ctrl, code:83, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 4  # [hidden]
bindp = Super+Shift+Ctrl, code:84, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 5  # [hidden]
bindp = Super+Shift+Ctrl, code:85, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 6  # [hidden]
bindp = Super+Shift+Ctrl, code:79, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 7  # [hidden]
bindp = Super+Shift+Ctrl, code:80, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 8  # [hidden]
bindp = Super+Shift+Ctrl, code:81, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 9  # [hidden]
bindp = Super+Shift+Ctrl, code:90, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 10 # [hidden]

# Move window to workspace 1–10 via Layer 1 + Alt-hold (Hyper = Ctrl+Shift+Alt+Super)
bind = Ctrl+Shift+Alt+Super, code:10, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 1 # [hidden]
bind = Ctrl+Shift+Alt+Super, code:11, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 2 # [hidden]
bind = Ctrl+Shift+Alt+Super, code:12, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 3 # [hidden]
bind = Ctrl+Shift+Alt+Super, code:13, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 4 # [hidden]
bind = Ctrl+Shift+Alt+Super, code:14, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 5 # [hidden]
bind = Ctrl+Shift+Alt+Super, code:15, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 6 # [hidden]
bind = Ctrl+Shift+Alt+Super, code:16, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 7 # [hidden]
bind = Ctrl+Shift+Alt+Super, code:17, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 8 # [hidden]
bind = Ctrl+Shift+Alt+Super, code:18, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 9 # [hidden]
bind = Ctrl+Shift+Alt+Super, code:19, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 10 # [hidden]
bindp = Ctrl+Shift+Alt+Super, code:87, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 1  # [hidden]
bindp = Ctrl+Shift+Alt+Super, code:88, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 2  # [hidden]
bindp = Ctrl+Shift+Alt+Super, code:89, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 3  # [hidden]
bindp = Ctrl+Shift+Alt+Super, code:83, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 4  # [hidden]
bindp = Ctrl+Shift+Alt+Super, code:84, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 5  # [hidden]
bindp = Ctrl+Shift+Alt+Super, code:85, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 6  # [hidden]
bindp = Ctrl+Shift+Alt+Super, code:79, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 7  # [hidden]
bindp = Ctrl+Shift+Alt+Super, code:80, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 8  # [hidden]
bindp = Ctrl+Shift+Alt+Super, code:81, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 9  # [hidden]
bindp = Ctrl+Shift+Alt+Super, code:90, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 10 # [hidden]

# Next / prev workspace
bind = Ctrl+Shift+Alt+Super, BracketLeft, workspace, -1 # Previous workspace
bind = Ctrl+Shift+Alt+Super, BracketRight, workspace, +1 # Next workspace

# Move window to next/prev workspace (relative)
bind = Ctrl+Shift, BracketLeft, movetoworkspace, -1 # [hidden]
bind = Ctrl+Shift, BracketRight, movetoworkspace, +1 # [hidden]

# Scratchpad
bind = Ctrl+Shift+Alt+Super, Z, togglespecialworkspace # Scratchpad toggle
bind = Ctrl+Shift, Semicolon, movetoworkspacesilent, special # Send to scratchpad

##! App launchers
bind = Ctrl+Shift+Alt+Super, Return, exec, ghostty # Terminal
bind = Ctrl+Shift+Alt+Super, T, exec, ghostty # [hidden]
bind = Ctrl+Shift+Alt+Super, W, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "brave" "google-chrome-stable" "zen-browser" "firefox" "chromium" "microsoft-edge-stable" "opera" "librewolf" # Browser
bind = Ctrl+Shift+Alt+Super, E, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "dolphin" "nautilus" "nemo" "thunar" "${TERMINAL}" "kitty -1 fish -c yazi" # File manager
bind = Ctrl+Shift+Alt+Super, C, exec, $codeEditor # Code editor
bind = Ctrl+Shift+Alt+Super, X, exec, $textEditor # Text editor
bind = Ctrl+Shift+Alt+Super, I, exec, $settingsApp # Settings
bind = Ctrl+Shift+Alt+Super, U, exec, $volumeMixer # Volume mixer

##! Session / screen
bindd = Ctrl+Shift, L, Lock, exec, loginctl lock-session # Lock
bindld = Ctrl+Shift, Backspace, Suspend system, exec, systemctl suspend || loginctl suspend # Suspend
bind = Ctrl+Shift, M, exit # Exit Hyprland

binde = Ctrl+Shift+Alt+Super, Minus, exec, ~/.config/hypr/hyprland/scripts/zoom.sh decrease 0.3 # Zoom out
binde = Ctrl+Shift+Alt+Super, Equal, exec, ~/.config/hypr/hyprland/scripts/zoom.sh increase 0.3 # Zoom in
